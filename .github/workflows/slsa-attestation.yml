name: slsa-attestation

# Builds, signs, and attests provenance for ExchangeOS container images at SLSA Level 3.
# Triggered on tag push (vX.Y.Z) — produces signed images + provenance + SBOM.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  id-token: write       # required for Cosign keyless OIDC signing
  contents: read
  packages: write
  attestations: write

env:
  GO_VERSION: "1.25.1"
  IMAGE_REGISTRY: gcr.io/revenu-platform

jobs:
  build-sign-attest:
    name: ${{ matrix.bin }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        bin: [api, worker, migrator, cls-cycle, eod, mq-bridge, cred-rotator]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: authenticate to GCP (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/${{ secrets.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github/providers/exchangeos
          service_account: github-actions@revenu-platform-prod.iam.gserviceaccount.com

      - name: gcloud login
        uses: google-github-actions/setup-gcloud@v2

      - name: configure docker for gcr
        run: gcloud auth configure-docker gcr.io --quiet

      - name: build + push multi-arch
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/${{ matrix.bin }}/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_REGISTRY }}/exchangeos-${{ matrix.bin }}:${{ github.ref_name }}
            ${{ env.IMAGE_REGISTRY }}/exchangeos-${{ matrix.bin }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: install cosign
        uses: sigstore/cosign-installer@v3

      - name: cosign keyless sign (Sigstore OIDC, Rekor transparency log)
        run: |
          cosign sign --yes \
            ${{ env.IMAGE_REGISTRY }}/exchangeos-${{ matrix.bin }}@${{ steps.build.outputs.digest }}

      - name: attach SBOM (CycloneDX)
        run: |
          go install github.com/CycloneDX/cyclonedx-gomod/cmd/cyclonedx-gomod@latest
          cyclonedx-gomod app -json -output sbom-${{ matrix.bin }}.cdx.json
          cosign attach sbom --sbom sbom-${{ matrix.bin }}.cdx.json \
            ${{ env.IMAGE_REGISTRY }}/exchangeos-${{ matrix.bin }}@${{ steps.build.outputs.digest }}

      - name: attest provenance (SLSA L3)
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.IMAGE_REGISTRY }}/exchangeos-${{ matrix.bin }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: verify chain (smoke check)
        run: |
          cosign verify \
            --certificate-identity-regexp 'https://github\.com/revenu-tech/exchangeos/\.github/workflows/slsa-attestation\.yml@refs/tags/.*' \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            ${{ env.IMAGE_REGISTRY }}/exchangeos-${{ matrix.bin }}@${{ steps.build.outputs.digest }}
