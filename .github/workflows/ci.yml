name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.25.1"

jobs:
  # ─── Lint / format / proto ───────────────────────────────────────────────
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: go vet + fmt
        run: |
          go vet ./...
          gofmt -l -s . | tee /tmp/_fmt
          test ! -s /tmp/_fmt

      - uses: bufbuild/buf-setup-action@v1
      - run: buf lint

      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout 5m

  # ─── Unit tests w/ race + coverage ───────────────────────────────────────
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: test
        run: go test -race -count=1 -coverprofile=coverage.out ./...

      - name: upload coverage
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
          retention-days: 7

  # ─── Build all 7 binaries ────────────────────────────────────────────────
  build:
    name: build
    needs: [lint]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        bin: [api, worker, migrator, cls-cycle, eod, mq-bridge, cred-rotator]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - run: |
          mkdir -p bin
          go build -trimpath -ldflags '-s -w' -o bin/exchangeos-${{ matrix.bin }} ./cmd/${{ matrix.bin }}

      - uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.bin }}
          path: bin/exchangeos-${{ matrix.bin }}
          retention-days: 3

  # ─── Docker build (only api for PR; multi-bin on main) ───────────────────
  docker-build:
    name: docker (${{ matrix.bin }})
    needs: [build, test]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        bin: [api]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/${{ matrix.bin }}/Dockerfile
          push: false
          platforms: linux/amd64
          tags: exchangeos-${{ matrix.bin }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
